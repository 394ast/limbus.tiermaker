<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URL集計</title>

<style>
body { font-family: sans-serif; padding: 20px; }

.url-row {
  display: flex;
  gap: 5px;
  margin-bottom: 5px;
}

pre {
  background: #f4f4f4;
  padding: 10px;
  overflow-x: auto;
}

#previewStatus {
  margin: 8px 0;
}

#previewFrame {
  width: 100%;
  min-height: 720px;
  border: 1px solid #ccc;
}
</style>
</head>
<body>

<h2>元のtableを入力</h2>
<input type="number" id="tableNumber" placeholder="ここに数値を入力">

<h2>URLを入力</h2>
<div id="urlContainer">
  <div class="url-row">
    <input type="text" class="urlInput" placeholder="URLを入力">
  </div>
</div>

<button onclick="addUrl()">＋</button>

<br><br>
<button onclick="copyJson()">コピー</button>
<button onclick="generate()">JSON生成＆出力</button>

<details>
  <summary>出力結果（クリックで開く）</summary>
  <pre id="output"></pre>
</details>

<details>
  <summary>デバッグ情報（URLごとの処理回数）</summary>
  <pre id="debugOutput"></pre>
</details>

<h2>埋め込みプレビュー（index.html）</h2>
<p id="previewStatus"></p>
<iframe id="previewFrame" title="index preview"></iframe>

<script>
function addUrl() {
  const container = document.getElementById("urlContainer");
  const div = document.createElement("div");
  div.className = "url-row";
  div.innerHTML = `
    <input type="text" class="urlInput" placeholder="URLを入力">
  `;
  container.appendChild(div);
}

async function generate() {
  const num = document.getElementById("tableNumber").value;
  const previewStatus = document.getElementById("previewStatus");
  const previewFrame = document.getElementById("previewFrame");
  const debugOutput = document.getElementById("debugOutput");
  const urlInputs = Array.from(document.querySelectorAll(".urlInput"));
  const rawUrls = urlInputs.map((input) => input.value.trim()).filter(Boolean);

  if (!num) {
    alert("数値を入力してください");
    return;
  }

  if (rawUrls.length === 0) {
    alert("URLを1件以上入力してください");
    return;
  }

  const url = `https://raw.githubusercontent.com/394ast/limbus.tiermaker/main/data/table${num}.json`;

  try {
    const response = await fetch(url);

    if (!response.ok) {
      throw new Error("取得失敗");
    }

    const data = await response.json();
    const aggregatedRows = data.map((row) => [...row]);
    const rowById = new Map(aggregatedRows.map((row) => [row[0], row]));
    const debugCounts = [];

    for (const rawUrl of rawUrls) {
      const { xValue, compressedParam } = parseTiermakerUrl(rawUrl);
      const defaultGroups = buildDefaultGroupById(data, xValue);
      const manualGroupsByC = decodeManualGroupsByC(compressedParam);
      const counts = { manual: 0, default: 0 };

      data.forEach((sourceRow) => {
        const id = sourceRow[0];
        const row = rowById.get(id);
        if (!row) return;

        const defaultGroup = defaultGroups.get(id);
        const manualGroup = manualGroupsByC.get(id);

        if (manualGroup !== undefined) {
          if (manualGroup !== 0) {
              row[1] += manualGroup;
              row[2] += 1;
              counts.manual += 1;
          }
        }
        else{
          row[3] += defaultGroup;
          row[4] += 1;
          counts.default += 1;
        }
      });

      debugCounts.push(`${rawUrl}\n  マニュアル: ${counts.manual}回\n  デフォルト: ${counts.default}回`);
    }

    const formatted = JSON.stringify(aggregatedRows, null, 2);
    document.getElementById("output").textContent = formatted;
    debugOutput.textContent = debugCounts.join("\n\n");

    const cacheKey = `aggregation-preview-table-${Date.now()}-${Math.random().toString(36).slice(2)}`;
    sessionStorage.setItem(cacheKey, JSON.stringify(aggregatedRows));

    previewFrame.src = `index.html?T=${encodeURIComponent(num)}&tableDataKey=${encodeURIComponent(cacheKey)}`;
    previewStatus.textContent = "生成したJSONを使ってindex.htmlを埋め込み表示しています。";

  } catch (error) {
    document.getElementById("output").textContent =
      "エラー: ファイルが存在しないか取得できません";
    debugOutput.textContent = "";
    previewStatus.textContent = "エラーにより埋め込みプレビューを更新できませんでした。";
    previewFrame.removeAttribute("src");
  }
}

function copyJson() {
  const text = document.getElementById("output").textContent;
  navigator.clipboard.writeText(text);
  alert("コピーしました");
}

function calcValue(row, x) {
  const numerator = row[1] + 0.01 * x * row[3];
  const denominator = row[2] + 0.01 * x * row[4];
  return denominator === 0 ? NaN : numerator / denominator;
}

function buildDefaultGroupById(rows, x) {
  const result = new Map();
  rows.forEach((row) => {
    const id = row[0];
    const value = calcValue(row, x);
    if (!Number.isFinite(value)) {
      throw new Error(`ID ${id} の計算結果が不正です`);
    }
    const rounded = Math.round(value);
    if (rounded < 1 || rounded > 9) {
      throw new Error(`ID ${id} の丸め後グループが範囲外です: ${rounded}`);
    }
    result.set(id, rounded);
  });
  return result;
}

function parseTiermakerUrl(rawUrl) {
  const parsed = new URL(rawUrl);
  const tParam = parsed.searchParams.get("T");
  const xParam = parsed.searchParams.get("X");
  const cParam = parsed.searchParams.get("C");
  if (tParam === null || xParam === null || cParam === null) {
    throw new Error("URLは ?T=...&X=...&C=... 形式で入力してください");
  }
  const xValue = Number(xParam);
  if (!Number.isFinite(xValue)) {
    throw new Error("URLのXパラメータが数値ではありません");
  }
  return {
    tableIndex: Number.parseInt(tParam, 10),
    xValue,
    compressedParam: cParam,
  };
}

function fromBase64Url(input) {
  const normalized = input.replace(/-/g, "+").replace(/_/g, "/");
  const padLength = (4 - (normalized.length % 4)) % 4;
  return atob(`${normalized}${"=".repeat(padLength)}`);
}

function decodeSection(section, codingDiffId = 0) {
  if (!section) return [];

  const ids = [];
  let i = 0;

  while (i < section.length) {
    const highChar = section[i];
    const lowCharLength = codingDiffId === 1 ? 2 : 1;
    const lowStartRaw = section.slice(i + 1, i + 1 + lowCharLength);
    if (!highChar || lowStartRaw.length !== lowCharLength) {
      throw new Error("Cパラメータの形式が不正です（ID桁不足）");
    }

    const high = Number.parseInt(highChar, 36);
    const lowStart = Number.parseInt(lowStartRaw, codingDiffId === 1 ? 10 : 36);
    if (!Number.isInteger(high) || !Number.isInteger(lowStart)) {
      throw new Error("Cパラメータの形式が不正です（base36変換失敗）");
    }

    const rangeMark = section[i + 1 + lowCharLength];
    if (rangeMark === "~") {
      const lowEndRaw = section.slice(i + 2 + lowCharLength, i + 2 + (lowCharLength * 2));
      const lowEnd = Number.parseInt(lowEndRaw ?? "", codingDiffId === 1 ? 10 : 36);
      if (!Number.isInteger(lowEnd) || lowEnd < lowStart) {
        throw new Error("Cパラメータの形式が不正です（範囲指定）");
      }

      for (let low = lowStart; low <= lowEnd; low += 1) {
        ids.push(high * 1000 + low);
      }

      i += 2 + (lowCharLength * 2);
      continue;
    }

    ids.push(high * 1000 + lowStart);
    i += 1 + lowCharLength;
  }

  return ids;
}

function parseCompressedDiffParam(cParam) {
  if (!cParam) {
    return { codingDiffId: 0, payload: cParam };
  }

  if (cParam.startsWith("1:")) {
    return { codingDiffId: 1, payload: cParam.slice(2) };
  }

  return { codingDiffId: 0, payload: cParam };
}

function decodeManualGroupsByC(cParam) {
  const result = new Map();
  const { codingDiffId, payload } = parseCompressedDiffParam(cParam);
  if (!payload) return result;

  const decoded = fromBase64Url(payload);
  const sections = decoded.split(".");
  if (sections.length !== 10) {
    throw new Error("Cパラメータの形式が不正です（セクション数）");
  }

  for (let sectionIndex = 0; sectionIndex < sections.length; sectionIndex += 1) {
    const group = 9 - sectionIndex;
    const ids = decodeSection(sections[sectionIndex], codingDiffId);
    ids.forEach((id) => {
      result.set(id, group);
    });
  }

  return result;
}
</script>

</body>
</html>
